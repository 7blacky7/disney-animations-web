version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quiz-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: quizplatform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: quiz123
    volumes:
      - quiz-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  quiz-pgdata:
    driver: local
